<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيدليات د. مراد صادق</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6624">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
    <style>
        :root { --primary: #ff6624; --silver: #d1d1d1; --bg: #000; --card: #121212; }
        body { background: var(--bg); color: var(--silver); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        #splash img { width: 250px; object-fit: contain; }
        
        #toggleBtn { position: fixed; top: 15px; right: 15px; z-index: 1001; background: var(--primary); color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; }
        .sidebar { width: 280px; background: var(--card); height: 100vh; position: fixed; right: 0; top: 0; border-left: 1px solid #222; transition: 0.3s; z-index: 999; }
        .sidebar.hidden { transform: translateX(100%); }
        .logo-box { padding: 40px 20px; text-align: center; }
        .logo-box img { width: 100%; max-width: 180px; }

        .main { margin-right: 280px; height: 100vh; display: flex; flex-direction: column; transition: 0.3s; }
        .main.full { margin-right: 0; }
        
        .header-search { padding: 60px 15px 15px; background: var(--bg); }
        .search-input { background: #1a1a1a; border: 2px solid #333; padding: 15px; border-radius: 12px; color: #fff; width: 100%; font-family: 'Cairo'; font-size: 18px; outline: none; box-sizing: border-box; }
        .search-input:focus { border-color: var(--primary); }

        #listBody { flex: 1; overflow-y: auto; padding: 0 15px 20px; }
        .item { display: flex; align-items: center; padding: 15px; background: var(--card); margin-bottom: 8px; border-radius: 10px; border-right: 4px solid var(--primary); }
        .item-info { flex: 1; }
        .item-info b { display: block; color: #fff; font-size: 16px; }
        .item-info span { font-size: 13px; color: #666; }
        .item-price { color: var(--primary); font-weight: bold; font-size: 20px; margin-right: 15px; }
        .cam-btn { color: var(--primary); font-size: 22px; margin-left: 15px; cursor: pointer; }

        @media (max-width: 768px) { .main { margin-right: 0; } }
    </style>
</head>
<body>

    <div id="splash"><img src="logo.png"></div>
    <button id="toggleBtn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

    <div class="sidebar" id="sidebar">
        <div class="logo-box"><img src="logo.png"></div>
        <div style="padding: 20px; text-align: center;">
            <button onclick="doSync()" style="background:var(--primary); border:none; padding:12px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer;">
                <i class="fas fa-sync"></i> تحديث البيانات
            </button>
            <p id="syncStatus" style="font-size:12px; color:#555; margin-top:10px;"></p>
        </div>
    </div>

    <div class="main" id="mainArea">
        <div class="header-search">
            <input type="text" id="searchInput" class="search-input" placeholder="ابحث بالعربي أو الإنجليزي..." oninput="instantSearch()">
        </div>
        <div id="listBody"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzKQE2yl_nk20VYkxpis5qjAPmXzocdsUIAsrlitx2fXqqEELSVZeeRWewwySuCE7GeMg/exec";
        let masterData = [];
        let viewData = [];

        // خريطة تحويل الحروف للبحث المتبادل (Transliteration Map)
        const charMap = {
            'a': 'ا', 'b': 'ب', 't': 'ت', 's': 'س', 'j': 'ج', 'h': 'ح', 'x': 'خ', 'd': 'د', 'r': 'ر', 'z': 'ز',
            's': 'ص', 'f': 'ف', 'q': 'ق', 'k': 'ك', 'l': 'ل', 'm': 'م', 'n': 'ن', 'o': 'و', 'y': 'ي', 'g': 'ج',
            'p': 'ب', 'v': 'ف'
        };

        window.onload = () => {
            const saved = localStorage.getItem('pharmacyData');
            if (saved) {
                masterData = JSON.parse(saved).slice(1);
                instantSearch(); 
                document.getElementById('syncStatus').innerText = "آخر مزامنة: " + localStorage.getItem('lastSyncTime');
            } else { doSync(); }
            setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(()=> document.getElementById('splash').remove(), 500); }, 1500);
        };

        function translateQuery(q) {
            let translated = "";
            for (let char of q) {
                translated += charMap[char] || char;
            }
            return translated;
        }

        function instantSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const words = query.split(" ");
            const translatedQuery = translateQuery(query); // محاولة فهم الكلمة لو كتبت بلغة تانية

            viewData = masterData.filter(row => {
                const rowStr = (row[0] + " " + row[1]).toLowerCase();
                // البحث في الأصل وفي الترجمة التقريبية
                return words.every(word => rowStr.includes(word) || rowStr.includes(translateQuery(word)));
            });

            renderRows();
        }

        function renderRows() {
            const container = document.getElementById('listBody');
            container.innerHTML = '';
            const limit = viewData.slice(0, 100); 
            const fragment = document.createDocumentFragment();
            limit.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <i class="fas fa-camera cam-btn" onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(item[1])}&tbm=isch','_blank')"></i>
                    <div class="item-info">
                        <b>${item[1]}</b>
                        <span>كود: ${item[0]}</span>
                    </div>
                    <div class="item-price">${item[2]}</div>
                `;
                fragment.appendChild(div);
            });
            container.appendChild(fragment);
        }

        async function doSync() {
            try {
                const res = await fetch(API_URL + "?action=getData");
                const json = await res.json();
                localStorage.setItem('pharmacyData', JSON.stringify(json.data));
                localStorage.setItem('lastSyncTime', json.lastSync);
                location.reload();
            } catch (e) { alert("تأكد من اتصال الإنترنت!"); }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden');
            document.getElementById('mainArea').classList.toggle('full');
        }
        // كود تسجيل الخدمة للسماح بالتثبيت
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(() => {
    console.log('Service Worker Registered');
  });
}
    </script>
</body>
</html>
