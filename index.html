<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr.Mourad Pharmacies</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff6624; --silver: #d1d1d1; --bg: #000; --card: #121212; --header-h: 150px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--silver); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; overflow: hidden; }

        /* شاشة الفتح */
        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.4s; pointer-events: none; }
        #splash img { width: 220px; object-fit: contain; }

        /* الهيدر الثابت */
        header { 
            position: fixed; top: 0; left: 0; right: 0; height: var(--header-h); 
            background: var(--bg); z-index: 900; padding: 10px; border-bottom: 1px solid #222;
            display: flex; flex-direction: column; align-items: center;
        }
        .brand-box { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .brand-box img { height: 60px; width: auto; object-fit: contain; }
        .brand-box h1 { font-size: 18px; color: #fff; margin: 0; font-weight: 700; }

        .search-row { display: flex; width: 100%; gap: 8px; max-width: 600px; padding: 0 5px; }
        .search-input { flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 12px 15px; border-radius: 10px; color: #fff; font-family: 'Cairo'; font-size: 16px; outline: none; }
        .filter-btn { background: var(--primary); border: none; color: #fff; padding: 0 15px; border-radius: 10px; cursor: pointer; font-size: 18px; }

        /* الغطاء والقائمة الجانبية */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 998; display: none; backdrop-filter: blur(4px); }
        .sidebar { 
            width: 290px; background: var(--card); height: 100vh; position: fixed; 
            right: 0; top: 0; z-index: 999; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px; border-left: 1px solid #333; overflow-y: auto;
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar h3 { color: var(--primary); border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; font-size: 16px; }

        .filter-group { margin-bottom: 15px; }
        .filter-group label { display: block; margin-bottom: 6px; font-size: 13px; color: #fff; }
        .filter-select { width: 100%; background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 8px; font-family: 'Cairo'; outline: none; }
        .sidebar-input { width: 100%; background: #111; color: #ccc; border: 1px solid #333; padding: 8px; border-radius: 6px; font-family: 'Cairo'; font-size: 12px; direction: ltr; }

        /* النتائج */
        main { margin-top: var(--header-h); height: calc(100vh - var(--header-h)); overflow-y: auto; padding: 12px; -webkit-overflow-scrolling: touch; }
        .item { display: flex; align-items: center; padding: 15px; background: var(--card); margin-bottom: 10px; border-radius: 12px; border: 1px solid #222; border-right: 4px solid var(--primary); cursor: pointer; }
        .item-info { flex: 1; }
        .item-info b { display: block; color: #fff; font-size: 15px; margin-bottom: 2px; }
        .item-info span { font-size: 12px; color: #666; display: block; }
        .item-info .tags { font-size: 11px; color: var(--primary); margin-top: 4px; }
        .item-price { color: var(--primary); font-weight: bold; font-size: 20px; min-width: 70px; text-align: left; }
        .cam-icon { color: var(--primary); font-size: 20px; margin-left: 15px; cursor: pointer; padding: 5px; }

        /* النافذة المنبثقة المحسنة */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; padding: 20px; overflow-y: auto; }
        .modal-content { background: var(--card); border: 1px solid #333; border-radius: 15px; padding: 20px; max-width: 600px; margin: 20px auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .modal-header h2 { color: #fff; font-size: 18px; margin: 0; }
        .close-modal { color: var(--primary); font-size: 24px; cursor: pointer; }
        
        .section-title { color: var(--primary); font-size: 14px; margin-top: 15px; margin-bottom: 8px; border-right: 3px solid var(--primary); padding-right: 8px; font-weight: bold; }
        .sub-item { display: flex; justify-content: space-between; background: #1a1a1a; padding: 10px; margin-bottom: 5px; border-radius: 6px; font-size: 14px; }
        .sub-item span { color: #fff; }
        .sub-item i { color: var(--primary); }

        /* زر Drugs.com المطور */
        .drugs-card { background: #0c0c0c; border: 1px dashed #333; border-radius: 10px; padding: 15px; margin-top: 15px; text-align: center; }
        .drugs-btn { display: inline-flex; align-items: center; gap: 8px; background: #0054a6; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 13px; transition: 0.2s; }
        .drugs-btn:hover { background: #004080; }

        #syncBtn { background: var(--primary); color: #fff; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; margin-top: 15px; font-family: 'Cairo'; font-weight: bold; }
    </style>
</head>
<body>

    <div id="splash"><img src="logo.png"></div>
    <div id="overlay" onclick="toggleSidebar()"></div>

    <header>
        <div class="brand-box">
            <img src="logo.png" alt="Logo">
            <h1>Dr.Mourad Pharmacies</h1>
        </div>
        <div class="search-row">
            <input type="text" id="searchInput" class="search-input" placeholder="بحث بالاسم، الكود، المادة أو الفئة..." oninput="applyFilters()">
            <button class="filter-btn" onclick="toggleSidebar()"><i class="fas fa-sliders-h"></i></button>
        </div>
    </header>

    <div class="sidebar" id="sidebar">
        <div style="text-align:center; margin-bottom:15px;"><img src="logo.png" style="width:80px; object-fit:contain;"></div>
        
        <h3>خيارات الترتيب</h3>
        <div class="filter-group">
            <label>ترتيب حسب السعر:</label>
            <select id="sortOrder" class="filter-select" onchange="applyFilters()">
                <option value="none">افتراضي</option>
                <option value="priceLow">من الأقل للأعلى</option>
                <option value="priceHigh">من الأعلى للأقل</option>
            </select>
        </div>

        <h3>مصدر البيانات والمزامنة</h3>
        <div class="filter-group">
            <label>رابط API شيت جوجل (تغيير السورس):</label>
            <input type="text" id="sheetApiInput" class="sidebar-input" placeholder="https://script.google.com/macros/s/.../exec">
            <button onclick="saveApiUrl()" style="background:#222; border:1px solid #444; color:#fff; width:100%; padding:6px; margin-top:5px; border-radius:5px; font-family:'Cairo'; font-size:12px; cursor:pointer;">حفظ السورس الجديد</button>
        </div>

        <button id="syncBtn" onclick="doSync()"><i class="fas fa-sync"></i> تحديث البيانات</button>
        <p id="syncTime" style="font-size:10px; text-align:center; color:#555; margin-top:10px;"></p>
    </div>

    <div id="alternativesModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalDrugName">اسم الدواء</h2>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <div>
                <p style="font-size: 13px; margin: 0;">المادة الفعالة: <span id="modalActiveIng" style="color:#fff;"></span></p>
                <p style="font-size: 13px; margin: 5px 0 0 0;">المجموعة الدوائية: <span id="modalClass" style="color:var(--primary);"></span></p>
            </div>
            
            <div class="drugs-card">
                <p style="font-size:12px; color:#aaa; margin:0 0 10px 0;"><i class="fas fa-info-circle"></i> للتحقق من الميكانيكية والجرعات والتداخلات الطبية الموثقة:</p>
                <a id="drugsComLink" href="#" target="_blank" class="drugs-btn">
                    <i class="fas fa-external-link-alt"></i> تصفح المادة على Drugs.com
                </a>
            </div>

            <div class="section-title">المثائل (نفس المادة الفعالة بالظبط)</div>
            <div id="exactMatches"></div>

            <div class="section-title">بدائل من نفس المجموعة الدوائية</div>
            <div id="classMatches"></div>
        </div>
    </div>

    <main id="listBody"></main>

    <script>
        // الرابط الافتراضي الأساسي في حال عدم وجود رابط مخصص في الذاكرة
        const DEFAULT_API_URL = "https://script.google.com/macros/s/AKfycbzKQE2yl_nk20VYkxpis5qjAPmXzocdsUIAsrlitx2fXqqEELSVZeeRWewwySuCE7GeMg/exec";
        let masterData = [];
        let viewData = [];

        const charMap = {
            'a': 'ا', 'b': 'ب', 't': 'ت', 's': 'س', 'j': 'ج', 'h': 'ح', 'x': 'خ', 'd': 'د', 'r': 'ر', 'z': 'ز',
            'f': 'ف', 'q': 'ق', 'k': 'ك', 'l': 'ل', 'm': 'م', 'n': 'ن', 'o': 'و', 'y': 'ي', 'g': 'ج', 'p': 'ب'
        };

        window.onload = () => {
            // تحميل الرابط المحفوظ أو استخدام الافتراضي
            const savedApi = localStorage.getItem('customApiUrl') || DEFAULT_API_URL;
            document.getElementById('sheetApiInput').value = savedApi;

            const saved = localStorage.getItem('pharmacyData');
            if (saved) {
                masterData = JSON.parse(saved).slice(1);
                applyFilters();
                document.getElementById('syncTime').innerText = "آخر مزامنة: " + (localStorage.getItem('lastSyncTime') || '--');
            } else { doSync(); }
            
            setTimeout(() => {
                const sp = document.getElementById('splash');
                if(sp){ sp.style.opacity='0'; setTimeout(()=>sp.remove(), 400); }
            }, 1200);
        };

        function saveApiUrl() {
            const newUrl = document.getElementById('sheetApiInput').value.trim();
            if(newUrl.startsWith("https://script.google.com/")) {
                localStorage.setItem('customApiUrl', newUrl);
                alert("تم حفظ سورس الشيت الجديد بنجاح! اضغط تحديث البيانات للمزامنة.");
            } else {
                alert("من فضلك أدخل رابط Web App صحيح الخاص بجوجل سكريبت.");
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            const ov = document.getElementById('overlay');
            ov.style.display = ov.style.display === 'block' ? 'none' : 'block';
        }

        function translateWord(w) {
            let res = "";
            for (let char of w) { res += charMap[char] || char; }
            return res;
        }

        function applyFilters() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const sort = document.getElementById('sortOrder').value;
            const words = query.split(" ");

            viewData = masterData.filter(row => {
                const rowStr = `${row[0]} ${row[1]} ${row[3] || ''} ${row[4] || ''}`.toLowerCase();
                return words.every(word => {
                    const translated = translateWord(word);
                    return rowStr.includes(word) || rowStr.includes(translated);
                });
            });

            if (sort === "priceLow") viewData.sort((a, b) => parseFloat(a[2]) - parseFloat(b[2]));
            else if (sort === "priceHigh") viewData.sort((a, b) => parseFloat(b[2]) - parseFloat(a[2]));

            renderRows();
        }

        function renderRows() {
            const container = document.getElementById('listBody');
            container.innerHTML = '';
            const fragment = document.createDocumentFragment();
            
            viewData.slice(0, 100).forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.onclick = (e) => { if(!e.target.classList.contains('cam-icon')) showAlternatives(item); };
                
                div.innerHTML = `
                    <i class="fas fa-camera cam-icon" onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(item[1])}&tbm=isch','_blank')"></i>
                    <div class="item-info">
                        <b>${item[1]}</b>
                        <span>كود: ${item[0]}</span>
                        <div class="tags">${item[3] ? '<i class="fas fa-flask"></i> ' + item[3] : ''}</div>
                    </div>
                    <div class="item-price">${item[2]}</div>
                `;
                fragment.appendChild(div);
            });
            container.appendChild(fragment);
            container.scrollTop = 0;
        }

        function showAlternatives(selectedItem) {
            const activeIng = selectedItem[3] ? selectedItem[3].trim() : '';
            const thClass = selectedItem[4] ? selectedItem[4].trim().toLowerCase() : '';

            document.getElementById('modalDrugName').innerText = selectedItem[1];
            document.getElementById('modalActiveIng').innerText = activeIng || 'غير مسجلة';
            document.getElementById('modalClass').innerText = selectedItem[4] || 'غير مسجلة';

            // بناء مسار البحث المباشر على Drugs.com للمادة الفعالة
            const drugsBtn = document.getElementById('drugsComLink');
            if(activeIng) {
                // استبدال المسافات بشرطة لتتوافق مع بنية روابط Drugs.com المعتادة
                const formattedName = activeIng.toLowerCase().replace(/ /g, "-");
                drugsBtn.href = `https://www.drugs.com/${encodeURIComponent(formattedName)}.html`;
                drugsBtn.style.pointerEvents = "auto";
                drugsBtn.style.opacity = "1";
            } else {
                // إذا لم تكن المادة مسجلة، نقوم بتحويله لصفحة البحث العامة في الموقع
                drugsBtn.href = `https://www.drugs.com/search.php?searchterm=${encodeURIComponent(selectedItem[1])}`;
            }

            const exactContainer = document.getElementById('exactMatches');
            const classContainer = document.getElementById('classMatches');
            exactContainer.innerHTML = '';
            classContainer.innerHTML = '';

            let exactCount = 0; let classCount = 0;
            const activeIngLower = activeIng.toLowerCase();

            masterData.forEach(item => {
                if (item[0] === selectedItem[0]) return;
                const currentActive = item[3] ? item[3].trim().toLowerCase() : '';
                const currentClass = item[4] ? item[4].trim().toLowerCase() : '';

                if (activeIngLower && currentActive === activeIngLower) {
                    exactCount++;
                    exactContainer.innerHTML += `<div class="sub-item"><span>${item[1]}</span><i>${item[2]} ج.م</i></div>`;
                } else if (thClass && currentClass === thClass) {
                    classCount++;
                    classContainer.innerHTML += `<div class="sub-item"><span>${item[1]} <small style="color:#666">(${item[3] || ''})</small></span><i>${item[2]} ج.م</i></div>`;
                }
            });

            if(exactCount === 0) exactContainer.innerHTML = '<p style="font-size:12px; color:#555;">لا توجد مثائل مطابقة مسجلة.</p>';
            if(classCount === 0) classContainer.innerHTML = '<p style="font-size:12px; color:#555;">لا توجد بدائل علاجية مسجلة.</p>';

            document.getElementById('alternativesModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('alternativesModal').style.display = 'none'; }

        async function doSync() {
            const btn = document.getElementById('syncBtn');
            btn.innerText = "جاري التحميل...";
            
            // جلب الرابط الحالي المستخدم (سواء كان الافتراضي أو المعدل بواسطة الدكتور)
            const currentApiUrl = localStorage.getItem('customApiUrl') || DEFAULT_API_URL;

            try {
                const res = await fetch(currentApiUrl + "?action=getData");
                const json = await res.json();
                localStorage.setItem('pharmacyData', JSON.stringify(json.data));
                localStorage.setItem('lastSyncTime', json.lastSync);
                location.reload();
            } catch (e) { 
                alert("حدث خطأ في الاتصال بالسورس الحالي! يرجى التحقق من الرابط أو اتصال الإنترنت."); 
                btn.innerText = "تحديث البيانات"; 
            }
        }
    </script>
</body>
</html>
