<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr.Mourad Pharmacies</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght=400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff6624; --silver: #d1d1d1; --bg: #000; --card: #121212; --header-h: 150px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--silver); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; overflow: hidden; }

        /* شاشة الفتح */
        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.4s; pointer-events: none; }
        #splash img { width: 220px; object-fit: contain; }

        /* الهيدر الثابت */
        header { 
            position: fixed; top: 0; left: 0; right: 0; height: var(--header-h); 
            background: var(--bg); z-index: 900; padding: 10px; border-bottom: 1px solid #222;
            display: flex; flex-direction: column; align-items: center;
        }
        .brand-box { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .brand-box img { height: 60px; width: auto; object-fit: contain; }
        .brand-box h1 { font-size: 18px; color: #fff; margin: 0; font-weight: 700; }

        .search-row { display: flex; width: 100%; gap: 8px; max-width: 600px; padding: 0 5px; }
        .search-input { flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 12px 15px; border-radius: 10px; color: #fff; font-family: 'Cairo'; font-size: 16px; outline: none; }
        .filter-btn { background: var(--primary); border: none; color: #fff; padding: 0 15px; border-radius: 10px; cursor: pointer; font-size: 18px; }

        /* القائمة الجانبية */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 998; display: none; backdrop-filter: blur(4px); }
        .sidebar { 
            width: 290px; background: var(--card); height: 100vh; position: fixed; 
            right: 0; top: 0; z-index: 999; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px; border-left: 1px solid #333; overflow-y: auto;
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar h3 { color: var(--primary); border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 15px; margin-bottom: 10px; font-size: 15px; }

        .filter-group { margin-bottom: 12px; }
        .filter-group label { display: block; margin-bottom: 4px; font-size: 12px; color: #fff; }
        .filter-select { width: 100%; background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 8px; border-radius: 8px; font-family: 'Cairo'; outline: none; font-size: 13px; }
        .sidebar-input { width: 100%; background: #111; color: #ccc; border: 1px solid #333; padding: 8px; border-radius: 6px; font-family: 'Cairo'; font-size: 11px; direction: ltr; }

        /* النتائج */
        main { margin-top: var(--header-h); height: calc(100vh - var(--header-h)); overflow-y: auto; padding: 12px; -webkit-overflow-scrolling: touch; }
        .item { display: flex; align-items: center; padding: 15px; background: var(--card); margin-bottom: 10px; border-radius: 12px; border: 1px solid #222; border-right: 4px solid var(--primary); cursor: pointer; }
        .item-info { flex: 1; }
        .item-info b { display: block; color: #fff; font-size: 15px; margin-bottom: 2px; }
        .item-info span { font-size: 12px; color: #666; display: block; }
        .item-info .desc { font-size: 13px; color: var(--primary); font-weight: bold; margin-top: 3px; margin-bottom: 3px; }
        .item-info .tags { font-size: 11px; color: #888; margin-top: 4px; }
        .item-price { color: var(--primary); font-weight: bold; font-size: 20px; min-width: 70px; text-align: left; }
        .cam-icon { color: var(--primary); font-size: 20px; margin-left: 15px; cursor: pointer; padding: 5px; }

        /* النوافذ المنبثقة */
        .modal, .clinical-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; padding: 20px; overflow-y: auto; }
        .clinical-modal { background: rgba(0,0,0,0.95); z-index: 3000; }
        
        .modal-content { background: var(--card); border: 1px solid #333; border-radius: 15px; padding: 20px; max-width: 600px; margin: 20px auto; position: relative; }
        .clinical-box { background: #0a0a0a; border: 1px solid var(--primary); border-radius: 15px; padding: 20px; max-width: 550px; margin: 40px auto; position: relative; }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .modal-header h2 { color: #fff; font-size: 18px; margin: 0; }
        .close-modal { color: var(--primary); font-size: 24px; cursor: pointer; }
        
        .section-title { color: var(--primary); font-size: 14px; margin-top: 15px; margin-bottom: 8px; border-right: 3px solid var(--primary); padding-right: 8px; font-weight: bold; }
        .sub-item { display: flex; justify-content: space-between; background: #1a1a1a; padding: 10px; margin-bottom: 5px; border-radius: 6px; font-size: 14px; }
        .sub-item span { color: #fff; }
        .sub-item i { color: var(--primary); }

        .ingredient-links { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; }
        .ing-btn { background: #1a1a1a; border: 1px solid var(--primary); color: #fff; padding: 8px 12px; border-radius: 8px; font-family: 'Cairo'; font-size: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
        .ing-btn:hover { background: var(--primary); }

        .clinical-title { color: #fff; border-bottom: 1px solid #222; padding-bottom: 8px; margin-bottom: 15px; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        .clinical-title i { color: var(--primary); }
        
        .clinical-grid { display: flex; flex-direction: column; gap: 10px; }
        .clinical-row { background: #121212; border: 1px solid #222; padding: 12px; border-radius: 8px; }
        .clinical-row strong { display: block; color: var(--primary); font-size: 13px; margin-bottom: 4px; }
        .clinical-row p { margin: 0; font-size: 13px; line-height: 1.6; color: #b3b3b3; text-align: justify; }

        #syncBtn { background: var(--primary); color: #fff; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; margin-top: 15px; font-family: 'Cairo'; font-weight: bold; }
    </style>
</head>
<body>

    <div id="splash"><img src="logo.png"></div>
    <div id="overlay" onclick="toggleSidebar()"></div>

    <header>
        <div class="brand-box">
            <img src="logo.png" alt="Logo">
            <h1>Dr.Mourad Pharmacies</h1>
        </div>
        <div class="search-row">
            <input type="text" id="searchInput" class="search-input" placeholder="بحث بالاسم، الكود، التوصيف، المادة..." oninput="applyFilters()">
            <button class="filter-btn" onclick="toggleSidebar()"><i class="fas fa-sliders-h"></i></button>
        </div>
    </header>

    <div class="sidebar" id="sidebar">
        <div style="text-align:center; margin-bottom:15px;"><img src="logo.png" style="width:80px; object-fit:contain;"></div>
        
        <h3>خيارات الترتيب</h3>
        <div class="filter-group">
            <label>ترتيب حسب السعر:</label>
            <select id="sortOrder" class="filter-select" onchange="applyFilters()">
                <option value="none">افتراضي</option>
                <option value="priceLow">من الأقل للأعلى</option>
                <option value="priceHigh">من الأعلى للأقل</option>
            </select>
        </div>

        <h3>إعدادات شيت جوجل</h3>
        <div class="filter-group">
            <label>رابط الشيت المباشر:</label>
            <input type="text" id="sheetUrlInput" class="sidebar-input" placeholder="https://docs.google.com/spreadsheets/d/.../edit">
        </div>
        
        <button onclick="saveSheetSettings()" style="background:#222; border:1px solid #444; color:#fff; width:100%; padding:8px; margin-top:5px; border-radius:6px; font-family:'Cairo'; font-size:13px; cursor:pointer; font-weight:bold;">حفظ الرابط</button>

        <button id="syncBtn" onclick="doSync()"><i class="fas fa-sync"></i> تحديث ومزامنة البيانات</button>
        <p id="syncTime" style="font-size:10px; text-align:center; color:#555; margin-top:10px;"></p>
    </div>

    <div id="alternativesModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalDrugName">اسم الدواء</h2>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <div>
                <p style="font-size: 13px; margin: 0;">المادة الفعالة: <span id="modalActiveIng" style="color:#fff;"></span></p>
                <p style="font-size: 13px; margin: 5px 0 0 0;">التوصيف الدوائي: <span id="modalClass" style="color:var(--primary);"></span></p>
            </div>
            
            <div class="section-title"><i class="fas fa-brain"></i> الفهرس الإكلينيكي المتقدم أوفلاين</div>
            <p style="font-size:11px; color:#777; margin:0;">اضغط على المادة الفعالة لرؤية المونوغراف السريري المعتمد:</p>
            <div id="ingredientButtons" class="ingredient-links"></div>

            <div class="section-title">المثائل (نفس المادة الفعالة بالظبط)</div>
            <div id="exactMatches"></div>

            <div class="section-title">بدائل من نفس التوصيف الدوائي</div>
            <div id="classMatches"></div>
        </div>
    </div>

    <div id="clinicalModal" class="clinical-modal">
        <div class="clinical-box">
            <div class="modal-header" style="margin-bottom: 10px;">
                <div class="clinical-title" style="margin:0;"><i class="fas fa-flask"></i> <span id="clinicalIngName">اسم المادة</span></div>
                <span class="close-modal" onclick="closeClinicalModal()">&times;</span>
            </div>
            <div class="clinical-grid" id="clinicalDataGrid"></div>
        </div>
    </div>

    <main id="listBody"></main>

    <script>
        const DEFAULT_SHEET_URL = "https://docs.google.com/spreadsheets/d/1vQ08P5kdfL_MOURAD_DEMO/edit";
        let masterData = [];
        let viewData = [];

        const charMap = {
            'a': 'ا', 'b': 'ب', 't': 'ت', 's': 'س', 'j': 'ج', 'h': 'ح', 'x': 'خ', 'd': 'د', 'r': 'ر', 'z': 'ز',
            'f': 'ف', 'q': 'ق', 'k': 'ك', 'l': 'ل', 'm': 'م', 'n': 'ن', 'o': 'و', 'y': 'ي', 'g': 'ج', 'p': 'ب'
        };

        // قاعدة بيانات داخلية مصاغة باحترافية شديدة ومراجعة بمستوى Advanced Pharmacotherapy لعشر عائلات أساسية
        const staticClinicalDB = {
            'paracetamol': {
                uses: 'تخفيف الآلام الخفيفة إلى المتوسطة (Analgesic) وخفض الحرارة (Antipyretic) المركزي.',
                mechanism: 'تثبيط انتقائي لإنزيمات Cyclooxygenase في الجهاز العصبي المركزي (COX-3)، مع تأثير محيطي ضعيف جداً على البروستاجلاندينات.',
                dose: 'البالغين: 500 مجم إلى 1 جم كل 4-6 ساعات حسب الحاجة. الحد الأقصى المطلق: 4 جم يومياً لتفادي تراكم مركب NAPQI السام.',
                side_effects: 'آمن جداً بالجرعات العلاجية؛ فرط الجرعة يسبب فشل كبدي حاد ونخر خلايا الكبد (Hepatic Necrosis).',
                excretion: 'استقلاب كبدي كامل (Hepatic Metabolism) عبر الاقتران بالجلوكورونيد والكبريتات؛ الإخراج كلوي للنواتج بنسبة 90%.',
                pregnancy: 'فئة الأمان (Category B)؛ يعتبر خط الدفاع الأول المسكن والآمن تماماً خلال جميع مراحل الحمل.',
                breastfeeding: 'آمن تماماً؛ يفرز بكميات ضئيلة جداً لا تشكل أي خطر فسيولوجي على الرضيع.',
                renal: 'معدل الترشيح الكبيبي (GFR) أقل من 10 مل/دقيقة: يجب زيادة الفاصل الزمني بين الجرعات إلى 8 ساعات كاملة.',
                hepatic: 'يمنع تماماً أو يقيد بحد أقصى (2 جم/يوم) في حالات القصور الكبدي الشديد أو إدمان الكحول المزمن.',
                interactions: 'الاستخدام المتزامن المزمن بجرعات عالية يزيد من تأثير الوارفارين (Warfarin)؛ المحفزات الإنزيمية كالفينيتوين تزيد سميته.'
            },
            'amoxicillin': {
                uses: 'علاج عدوى الجهاز التنفسي العلوي والسفلي، التهابات الأذن الوسطى، والمسالك البولية الحادة الناتجة عن بكتيريا حساسة.',
                mechanism: 'مضاد حيوي مبيد للبكتيريا (Bactericidal) يثبط تصنيع الجدار الخلوي البكتيري عبر الارتباط ببروتينات PBPs.',
                dose: 'البالغين: 500 مجم كل 8 ساعات أو 875 مجم كل 12 ساعة. الجرعة القصوى للعدوى الشديدة تصل لـ 3 جم/يوم.',
                side_effects: 'اضطرابات هضمية (إسهال، غثيان)، طفح جلدي، نادراً ردود فعل تحسسية حادة (Anaphylaxis).',
                excretion: 'إخراج كلوي سريع وغير متغير عبر الفلترة الكبيبية والإفراز الأنيلوبي النشط بنسبة 60-70%.',
                pregnancy: 'فئة الأمان (Category B)؛ آمن تماماً للاستخدام أثناء الحمل وتحت الإشراف الطبي للمظاهر الإكلينيكية.',
                breastfeeding: 'يفرز في لبن الأم؛ قد يسبب تحسس أو اضطراب في الفلورا المعوية للرضيع (إسهال أو قلاع) لكنه مقبول عموماً.',
                renal: 'إذا كان تصفية الكرياتينين (CrCl) بين 10-30 مل/دقيقة: يعطى بحد أقصى 500 مجم كل 12 ساعة. أقل من 10 يعطى كل 24 ساعة.',
                hepatic: 'لا يتطلب تعديل جرعات في القصور الكبدي المنفرد؛ يفرز كلوياً بشكل رئيسي.',
                interactions: 'يقلل من فاعلية حبوب منع الحمل الفموية؛ يرتفع تركيزه في الدم عند الاستخدام المتزامن مع بروبينسيد.'
            }
        };

        window.onload = () => {
            document.getElementById('sheetUrlInput').value = localStorage.getItem('customSheetUrl') || DEFAULT_SHEET_URL;

            const saved = localStorage.getItem('pharmacyData');
            if (saved) {
                try {
                    masterData = JSON.parse(saved);
                    applyFilters();
                    document.getElementById('syncTime').innerText = "آخر مزامنة: " + (localStorage.getItem('lastSyncTime') || '--');
                } catch(e) {
                    localStorage.removeItem('pharmacyData');
                }
            } else {
                renderRows();
            }
            
            setTimeout(hideSplash, 600);

            window.onclick = function(event) {
                const altModal = document.getElementById('alternativesModal');
                const clinModal = document.getElementById('clinicalModal');
                if (event.target === altModal) { closeModal(); }
                if (event.target === clinModal) { closeClinicalModal(); }
            };
        };

        function hideSplash() {
            const sp = document.getElementById('splash');
            if(sp){ sp.style.opacity='0'; setTimeout(()=>sp.remove(), 300); }
        }

        function saveSheetSettings() {
            const rawUrl = document.getElementById('sheetUrlInput').value.trim();
            if(rawUrl.includes("docs.google.com/spreadsheets")) {
                localStorage.setItem('customSheetUrl', rawUrl);
                alert("تم حفظ الرابط بنجاح! اضغط الآن على زر تحديث البيانات لجلبها.");
            } else { alert("من فضلك أدخل رابط شيت جوجل بشكل صحيح."); }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            const ov = document.getElementById('overlay');
            ov.style.display = ov.style.display === 'block' ? 'none' : 'block';
        }

        function translateWord(w) {
            let res = "";
            for (let char of w) { res += charMap[char] || char; }
            return res;
        }

        function applyFilters() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const sort = document.getElementById('sortOrder').value;
            const words = query.split(" ");

            if (!masterData || masterData.length === 0) return;

            viewData = masterData.filter(row => {
                if(!row || row.length < 3) return false;
                const rowStr = `${row[0]} ${row[1]} ${row[3] || ''} ${row[4] || ''}`.toLowerCase();
                return words.every(word => {
                    const translated = translateWord(word);
                    return rowStr.includes(word) || rowStr.includes(translated);
                });
            });

            if (sort === "priceLow") viewData.sort((a, b) => parseFloat(a[2]) - parseFloat(b[2]));
            else if (sort === "priceHigh") viewData.sort((a, b) => parseFloat(b[2]) - parseFloat(a[2]));

            renderRows();
        }

        function renderRows() {
            const container = document.getElementById('listBody');
            container.innerHTML = '';
            if (!viewData || viewData.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px; color:#777; font-size:14px;">البرنامج جاهز! افتح القائمة الجانبية ☰، ضع رابط الشيت ثم اضغط "تحديث".</div>';
                return;
            }
            const fragment = document.createDocumentFragment();
            
            viewData.slice(0, 100).forEach(item => {
                if (!item[1]) return;
                const div = document.createElement('div');
                div.className = 'item';
                div.onclick = (e) => { if(!e.target.classList.contains('cam-icon')) showAlternatives(item); };
                
                div.innerHTML = `
                    <i class="fas fa-camera cam-icon" onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(item[1])}&tbm=isch','_blank')"></i>
                    <div class="item-info">
                        <b>${item[1]}</b>
                        ${item[4] ? '<div class="desc">' + item[4] + '</div>' : ''}
                        <span>كود: ${item[0]}</span>
                        <div class="tags">${item[3] ? '<i class="fas fa-flask"></i> ' + item[3] : ''}</div>
                    </div>
                    <div class="item-price">${item[2]}</div>
                `;
                fragment.appendChild(div);
            });
            container.appendChild(fragment);
            container.scrollTop = 0;
        }

        // إرسال البيانات الكاملة للصنف الحالي لمعرفة محتوى العمود السادس المخصص للملاحظات المتقدمة
        let currentActiveItem = null;

        function showAlternatives(selectedItem) {
            currentActiveItem = selectedItem;
            const rawActiveIng = selectedItem[3] ? selectedItem[3].trim() : '';
            const thClass = selectedItem[4] ? selectedItem[4].trim().toLowerCase() : '';

            document.getElementById('modalDrugName').innerText = selectedItem[1];
            document.getElementById('modalActiveIng').innerText = rawActiveIng || 'غير مسجلة';
            document.getElementById('modalClass').innerText = selectedItem[4] || 'غير مسجلة';

            const btnContainer = document.getElementById('ingredientButtons');
            btnContainer.innerHTML = '';
            
            if(rawActiveIng) {
                const ingredients = rawActiveIng.split(/\s*(?:\+|\bplus\b|,|and)\s*/i);
                ingredients.forEach(ing => {
                    const cleanName = ing.trim();
                    if(cleanName) {
                        btnContainer.innerHTML += `
                            <button class="ing-btn" onclick="openClinicalInfo('${cleanName.replace(/'/g, "\\'")}')">
                                <i class="fas fa-user-md"></i> التقرير السريري لـ ${cleanName}
                            </button>
                        `;
                    }
                });
            } else {
                btnContainer.innerHTML = '<p style="font-size:12px; color:#555;">لا توجد مادة فعالة لعرض الفهرس السريري.</p>';
            }

            const exactContainer = document.getElementById('exactMatches');
            const classContainer = document.getElementById('classMatches');
            exactContainer.innerHTML = ''; classContainer.innerHTML = '';

            let exactCount = 0; let classCount = 0;
            const activeIngLower = rawActiveIng.toLowerCase();

            masterData.forEach(item => {
                if (item[0] === selectedItem[0]) return;
                const currentActive = item[3] ? item[3].trim().toLowerCase() : '';
                const currentClass = item[4] ? item[4].trim().toLowerCase() : '';

                if (activeIngLower && currentActive === activeIngLower) {
                    exactCount++;
                    exactContainer.innerHTML += `<div class="sub-item"><span>${item[1]}</span><i>${item[2]} ج.م</i></div>`;
                } else if (thClass && currentClass === thClass) {
                    classCount++;
                    classContainer.innerHTML += `<div class="sub-item"><span>${item[1]} <small style="color:#666">(${item[3] || ''})</small></span><i>${item[2]} ج.م</i></div>`;
                }
            });

            if(exactCount === 0) exactContainer.innerHTML = '<p style="font-size:12px; color:#555;">لا توجد مثائل مطابقة لتركيبة الصنف.</p>';
            if(classCount === 0) classContainer.innerHTML = '<p style="font-size:12px; color:#555;">لا توجد بدائل علاجية مسجلة من نفس التوصيف.</p>';

            document.getElementById('alternativesModal').style.display = 'block';
        }

        function openClinicalInfo(ingName) {
            const cleanKey = ingName.toLowerCase().trim();
            document.getElementById('clinicalIngName').innerText = ingName;
            const grid = document.getElementById('clinicalDataGrid');
            grid.innerHTML = '';

            // أولاً: فحص لو الشيت يحتوي على معلومة مخصصة مكتوبة بواسطة الدكتور في العمود السادس (الاندكس 5)
            // شريطة أن يكون الصنف الحالي المفتوح هو نفس الصنف الذي يحتوي على المادة
            const customSheetNote = (currentActiveItem && currentActiveItem.length >= 6 && currentActiveItem[5]) ? currentActiveItem[5].trim() : '';

            if (customSheetNote) {
                // عرض مخصص للمعلومة التي قمت بصياغتها يدويًا في الشيت
                grid.innerHTML = `
                    <div class="clinical-row" style="border-color: var(--primary);">
                        <strong style="font-size: 14px;"><i class="fas fa-pencil-alt"></i> معطيات الصيدلي الإكلينيكي المخصصة (من شيت جوجل):</strong>
                        <p style="color: #fff; font-size: 14px; margin-top: 8px;">${customSheetNote}</p>
                    </div>
                `;
            } else if (staticClinicalDB[cleanKey]) {
                // ثانياً: إذا لم تكن هناك معلومة بالشيت، نبحث في الموسوعة الداخلية الموثقة أوفلاين بمستوى Advanced Pharmacotherapy
                const data = staticClinicalDB[cleanKey];
                const labels = {
                    uses: 'الاستخدامات السريرية المتقدمة (Uses)', mechanism: 'ميكانيكية العمل الجزيئية (Mechanism)',
                    dose: 'البروتوكولات ونطاق الجرعات (Recommended Dose)', side_effects: 'الآثار العكسية والسمية الكبدية/الخلوية (Side Effects)',
                    excretion: 'الحركية الدوائية والإخراج (Excretion & PK)', pregnancy: 'الحمل وفئة أمان الجنين (Pregnancy Category)',
                    breastfeeding: 'إفراز المادة باللبن والرضاعة (Breastfeeding)', renal: 'معايير القصور الكلوي وتعديل الـ GFR',
                    hepatic: 'احتياطات الفشل والقصور الكبدي (Hepatic)', interactions: 'التفاعلات والارتطامات الدوائية الحرجة (Interactions)'
                };

                for (let key in labels) {
                    grid.innerHTML += `
                        <div class="clinical-row">
                            <strong>${labels[key]}</strong>
                            <p>${data[key] || 'لم يتم تسجيل معطيات سريرية.'}</p>
                        </div>
                    `;
                }
            } else {
                // ثالثاً: الدليل الافتراضي في حال عدم وجود معلومة مخصصة أو مادة مسجلة مسبقاً
                grid.innerHTML = `
                    <div class="clinical-row">
                        <strong>ملاحظة هندسية حول التحديث والتحسين المستمر:</strong>
                        <p style="color:#b3b3b3;">لتحسين وإدراج معلومات إكلينيكية بمستوى <b>Advanced Pharmacotherapy</b> خالية تماماً من الأخطاء، يمكنك ببساطة فتح شيت جوجل الخاص بك وإضافة عمود سادس <b>(العمود F)</b> واكتب فيه الملاحظات أو الجرعات الدقيقة لكل دواء. بمجرد قيامك بالضغط على "تحديث ومزامنة البيانات" ستظهر ملاحظاتك الاحترافية هنا فوراً وبشكل أوفلاين تماماً!</p>
                    </div>
                `;
            }

            document.getElementById('clinicalModal').style.display = 'block';
        }

        function closeClinicalModal() { document.getElementById('clinicalModal').style.display = 'none'; }
        function closeModal() { document.getElementById('alternativesModal').style.display = 'none'; }

        async function doSync() {
            const btn = document.getElementById('syncBtn');
            btn.innerText = "جاري التحميل...";
            
            const currentSheetUrl = document.getElementById('sheetUrlInput').value.trim();
            const matches = currentSheetUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);
            if (!matches || !matches[1]) {
                alert("رابط شيت جوجل غير صحيح!");
                btn.innerText = "تحديث البيانات";
                return;
            }
            
            const sheetId = matches[1];
            const directCsvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;

            try {
                const res = await fetch(directCsvUrl);
                if(!res.ok) throw new Error("Fetch error");
                const text = await res.text();
                
                const lines = text.split("\n");

                const parsedData = lines.map(line => {
                    let result = []; let current = ''; let inQuotes = false;
                    for (let i = 0; i < line.length; i++) {
                        let char = line[i];
                        if (char === '"') { inQuotes = !inQuotes; }
                        else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
                        else { current += char; }
                    }
                    result.push(current.trim());
                    return result;
                }).filter((row, index) => {
                    if (index === 0) {
                        const firstCell = row[0] ? row[0].toLowerCase() : '';
                        if (firstCell.includes('كود') || firstCell.includes('code') || firstCell.includes('الرقم')) {
                            return false; 
                        }
                    }
                    return row.length >= 3 && row[0] !== "" && row[0] !== undefined;
                });

                if(parsedData.length > 0) {
                    localStorage.setItem('pharmacyData', JSON.stringify(parsedData));
                    localStorage.setItem('customSheetUrl', currentSheetUrl);
                    const now = new Date();
                    const timeStr = now.toLocaleTimeString('ar-EG') + " - " + now.toLocaleDateString('ar-EG');
                    localStorage.setItem('lastSyncTime', timeStr);
                    location.reload();
                } else {
                    alert("لم نجد بيانات صالحة! تأكد من مطابقة الأعمدة.");
                    btn.innerText = "تحديث البيانات";
                }
            } catch (e) { 
                alert("فشلت المزامنة! تأكد أن الشيت متاح للعامة (Viewer)."); 
                btn.innerText = "تحديث البيانات"; 
            }
        }
    </script>
