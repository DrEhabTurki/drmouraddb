<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr.Mourad Pharmacies</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff6624; --silver: #d1d1d1; --bg: #000; --card: #121212; --header-h: 140px; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--silver); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; overflow: hidden; }

        /* شاشة الفتح المحسنة */
        #splash { 
            position: fixed; inset: 0; background: var(--bg); z-index: 10000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 0.4s ease-out; pointer-events: none;
        }
        #splash img { width: 220px; height: auto; object-fit: contain; margin-bottom: 20px; }
        .loader { width: 40px; height: 40px; border: 3px solid #333; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* الهيدر الثابت */
        header { 
            position: fixed; top: 0; left: 0; right: 0; height: var(--header-h); 
            background: var(--bg); z-index: 900; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            border-bottom: 1px solid #222;
        }
        .brand-box { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .brand-box img { height: 50px; width: auto; object-fit: contain; }
        .brand-box h1 { font-size: 18px; color: #fff; margin: 0; font-weight: 700; letter-spacing: 0.5px; }

        /* شريط البحث والفلترة */
        .search-row { display: flex; width: 100%; gap: 10px; max-width: 600px; }
        .search-input { 
            flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 12px 15px; 
            border-radius: 10px; color: #fff; font-family: 'Cairo'; font-size: 16px; outline: none; 
        }
        .filter-btn { 
            background: #1a1a1a; border: 1px solid #333; color: var(--primary); 
            padding: 0 15px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; 
        }

        /* القائمة الجانبية والغطاء الشفاف */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 998; display: none; backdrop-filter: blur(3px); }
        .sidebar { 
            width: 280px; background: var(--card); height: 100vh; position: fixed; 
            right: 0; top: 0; z-index: 999; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid #222; 
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar-header { padding: 30px 15px; text-align: center; border-bottom: 1px solid #222; }
        .sidebar-header img { width: 150px; object-fit: contain; }

        /* منطقة النتائج */
        main { margin-top: var(--header-h); height: calc(100vh - var(--header-h)); overflow-y: auto; padding: 15px; }
        .item { 
            display: flex; align-items: center; padding: 15px; background: var(--card); 
            margin-bottom: 10px; border-radius: 12px; border: 1px solid #222;
        }
        .item-info { flex: 1; }
        .item-info b { display: block; color: #fff; font-size: 16px; margin-bottom: 3px; }
        .item-info span { font-size: 12px; color: #666; }
        .item-price { color: var(--primary); font-weight: bold; font-size: 19px; margin-left: 10px; }
        .cam-icon { color: var(--primary); font-size: 20px; padding: 10px; cursor: pointer; }

        #menuBtn { position: fixed; bottom: 20px; right: 20px; z-index: 901; background: var(--primary); color: #fff; border: none; width: 55px; height: 55px; border-radius: 50%; font-size: 20px; box-shadow: 0 4px 15px rgba(255,102,36,0.4); }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash">
        <img src="logo.png" alt="Logo">
        <div class="loader"></div>
    </div>

    <!-- Overlay to close sidebar -->
    <div id="overlay" onclick="toggleSidebar()"></div>

    <header>
        <div class="brand-box">
            <img src="logo.png" alt="Logo">
            <h1>Dr.Mourad Pharmacies</h1>
        </div>
        <div class="search-row">
            <input type="text" id="searchInput" class="search-input" placeholder="بحث عربي أو إنجليزي..." oninput="instantSearch()">
            <button class="filter-btn" onclick="toggleSidebar()"><i class="fas fa-filter"></i></button>
        </div>
    </header>

    <button id="menuBtn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="logo.png" alt="Logo">
            <h3 style="color:white; margin-top:15px; font-size:14px;">إعدادات الفلترة</h3>
        </div>
        <div style="padding: 20px;">
            <button onclick="doSync()" style="background:var(--primary); border:none; padding:15px; width:100%; border-radius:10px; font-weight:bold; color:white;">
                <i class="fas fa-sync"></i> تحديث البيانات
            </button>
            <p id="syncTime" style="font-size:11px; color:#555; text-align:center; margin-top:10px;"></p>
        </div>
    </div>

    <main id="listBody"></main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzKQE2yl_nk20VYkxpis5qjAPmXzocdsUIAsrlitx2fXqqEELSVZeeRWewwySuCE7GeMg/exec";
        let masterData = [];
        let viewData = [];

        window.onload = () => {
            const saved = localStorage.getItem('pharmacyData');
            if (saved) {
                masterData = JSON.parse(saved).slice(1);
                instantSearch();
                document.getElementById('syncTime').innerText = "آخر مزامنة: " + (localStorage.getItem('lastSyncTime') || 'لا يوجد');
            } else { doSync(); }
            
            // إخفاء شاشة الفتح بسلاسة
            setTimeout(() => {
                const sp = document.getElementById('splash');
                sp.style.opacity = '0';
                setTimeout(() => sp.remove(), 400);
            }, 1200);
        };

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            const isOpen = sb.classList.toggle('open');
            ov.style.display = isOpen ? 'block' : 'none';
        }

        function instantSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const words = query.split(" ");
            
            viewData = masterData.filter(row => {
                const rowStr = (row[0] + " " + row[1]).toLowerCase();
                return words.every(word => rowStr.includes(word));
            });
            renderRows();
        }

        function renderRows() {
            const container = document.getElementById('listBody');
            container.innerHTML = '';
            const fragment = document.createDocumentFragment();
            
            viewData.slice(0, 80).forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <i class="fas fa-camera cam-icon" onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(item[1])}&tbm=isch','_blank')"></i>
                    <div class="item-info">
                        <b>${item[1]}</b>
                        <span>كود: ${item[0]}</span>
                    </div>
                    <div class="item-price">${item[2]}</div>
                `;
                fragment.appendChild(div);
            });
            container.appendChild(fragment);
            container.scrollTop = 0;
        }

        async function doSync() {
            document.getElementById('syncTime').innerText = "جاري المزامنة...";
            try {
                const res = await fetch(API_URL + "?action=getData");
                const json = await res.json();
                localStorage.setItem('pharmacyData', JSON.stringify(json.data));
                localStorage.setItem('lastSyncTime', json.lastSync);
                location.reload();
            } catch (e) { alert("تأكد من الإنترنت!"); }
        }
    </script>
</body>
</html>
