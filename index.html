<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #121212; --card: #1E1E1E; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Cairo', sans-serif; margin: 0; display: flex; }
        
        /* القائمة الجانبية */
        .sidebar { 
            width: 280px; background: var(--card); height: 100vh; 
            padding: 20px; border-left: 1px solid #333; position: fixed; right: 0;
        }
        .logo-area { text-align: center; color: var(--gold); margin-bottom: 30px; }
        
        .sync-container {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 15px; border-radius: 15px; text-align: center; margin-top: auto;
        }
        .last-sync { font-size: 11px; color: var(--gold); display: block; margin-bottom: 10px; }
        
        .btn-sync {
            background: var(--gold); color: black; border: none; padding: 10px;
            width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* منطقة المحتوى */
        .content { margin-right: 300px; padding: 20px; width: 100%; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
        th { background: #252525; color: var(--gold); padding: 15px; text-align: right; }
        td { padding: 12px; border-bottom: 1px solid #333; font-size: 14px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">
            <i class="fas fa-prescription-bottle-alt fa-3x"></i>
            <h2>صيدليتي</h2>
        </div>
        
        <nav>
            <p><i class="fas fa-home"></i> الرئيسة</p>
            <p><i class="fas fa-box"></i> المخزن</p>
        </nav>

        <div class="sync-container">
            <span class="last-sync" id="syncTime">جاري جلب البيانات...</span>
            <button class="btn-sync" onclick="doSync()">
                <i class="fas fa-sync" id="syncIcon"></i> مزامنة الشيت
            </button>
        </div>
    </div>

    <div class="content">
        <h2 style="color: var(--gold)">قائمة الأدوية</h2>
        <div id="tableContainer">تحميل البيانات من الشيت...</div>
    </div>

    <script>
        const WEB_APP_URL = https://script.google.com/macros/s/AKfycbzKQE2yl_nk20VYkxpis5qjAPmXzocdsUIAsrlitx2fXqqEELSVZeeRWewwySuCE7GeMg/exec;

        // جلب البيانات فور فتح التطبيق
        async function loadData() {
            const response = await fetch(WEB_APP_URL + "?action=getData");
            const result = await response.json();
            document.getElementById('syncTime').innerText = "آخر مزامنة: " + result.lastSync;
            renderTable(result.data);
        }

        function renderTable(data) {
            let html = '<table><thead><tr>';
            data[0].forEach(header => html += `<th>${header}</th>`);
            html += '</tr></thead><tbody>';
            
            for (let i = 1; i < data.length; i++) {
                html += '<tr>';
                data[i].forEach(cell => html += `<td>${cell}</td>`);
                html += '</tr>';
            }
            html += '</tbody></table>';
            document.getElementById('tableContainer').innerHTML = html;
        }

        async function doSync() {
            const icon = document.getElementById('syncIcon');
            icon.classList.add('fa-spin');
            await fetch(WEB_APP_URL + "?action=sync");
            await loadData(); // إعادة تحميل البيانات بعد المزامنة
            icon.classList.remove('fa-spin');
            alert("تمت المزامنة بنجاح مع شيت جوجل");
        }

        window.onload = loadData;
    </script>
</body>
</html>
